version: '3.8'

services:

  ignition:
    image: inductiveautomation/ignition:8.3.4
    container_name: ignition-gateway
    ports:
      - "8090:8088"
    environment:
      - ACCEPT_IGNITION_EULA=Y
      - GATEWAY_ADMIN_USERNAME=admin
      - GATEWAY_ADMIN_PASSWORD=password
    volumes:
      - ./ignition/data:/usr/local/bin/ignition/data
    # Wait for DB to be healthy before starting (Docker Compose 'condition' requires non-swarm compose)
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:   # SQL Server for Ignition
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ignition-mssql
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=YourStrong@Pass123
    volumes:
      - mssql-data:/var/opt/mssql
    restart: unless-stopped
    healthcheck:
      # Check TCP listener on 1433; adjust if `ss` is not available in image
      test: ["CMD-SHELL", "bash -c \"ss -ltn | grep -q ':1433' || exit 1\""]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mssql-data:


